<div class="login-container">

  <!-- Top-left back -->
  <div class="auth-top-link">
    <a routerLink="/">← Back to Home</a>
  </div>

  <!-- Card -->
  <div class="login-card">

    <!-- Logo -->
    <img src="assets/charipay-logo.svg" alt="Charipay Logo" class="logo-img" />

    <!-- Heading -->
    <h2 class="fw-bold text-center mb-1">Welcome back</h2>
    <p class="text-muted text-center mb-4">
      Login to continue to Charipay
    </p>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input
          type="email"
          formControlName="email"
          class="form-control"
          placeholder="Enter your email" />

        <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
             class="text-danger mt-1">
          <small *ngIf="loginForm.get('email')?.errors?.['required']">Email is required</small>
          <small *ngIf="loginForm.get('email')?.errors?.['email']">Invalid email format</small>
        </div>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          type="password"
          formControlName="password"
          class="form-control"
          placeholder="Enter your password" />

        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
             class="text-danger mt-1">
          <small>Password is required</small>
        </div>
      </div>

      <!-- Submit -->
      <button
        class="btn btn-primary w-100 mt-2"
        type="submit"
        [disabled]="loginForm.invalid || isLoading">
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>

    </form>

    <!-- Footer -->
    <p class="text-center mt-4 mb-1">
      Don’t have an account?
      <a routerLink="/auth/register" class="fw-semibold text-decoration-none">
        Sign up
      </a>
    </p>

    <p class="text-center mb-0">
      Just exploring?
      <a routerLink="/campaigns" class="fw-semibold text-decoration-none">
        Browse campaigns
      </a>
    </p>

  </div>
</div>
