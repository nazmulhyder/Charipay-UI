<div class="signup-container">

  <div class="auth-top-link">
    <a routerLink="/">← Back to Home</a>
  </div>

  <div class="signup-card">

    <img src="/assets/charipay-logo.svg" alt="Charipay Logo" class="logo-img" />

    <h2 class="fw-bold text-center mb-1">Create your account</h2>
    <p class="text-muted text-center mb-4">
      Join Charipay and start making an impact
    </p>

    <form [formGroup]="registerForm" (ngSubmit)="onSignup()">

      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Full Name</label>
          <input type="text" formControlName="fullName" class="form-control" placeholder="Enter your name" />
        </div>

        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" formControlName="email" class="form-control" placeholder="Enter your email" />
        </div>

        <div class="col-md-6">
          <label class="form-label">Phone <span class="text-muted"></span></label>
          <input type="text" formControlName="phone" class="form-control" placeholder="Phone number" />
        </div>

        <div class="col-md-6">
          <label class="form-label">Password</label>
          <input type="password" formControlName="password" class="form-control" placeholder="Enter password" />
        </div>

        <div class="col-md-6">
          <label class="form-label">Confirm Password</label>
          <input type="password" formControlName="confirmPassword" class="form-control" placeholder="Confirm password" />
        </div>

        <div class="col-md-6">
          <label class="form-label">Join as</label>
          <div class="d-flex gap-2">
            <button type="button"
                    class="role-btn"
                    [class.active]="registerForm.value.roleId === '2'"
                    (click)="registerForm.patchValue({ roleId: '2' })">
              Donor
            </button>

            <button type="button"
                    class="role-btn"
                    [class.active]="registerForm.value.roleId === '3'"
                    (click)="registerForm.patchValue({ roleId: '3' })">
              Volunteer
            </button>
          </div>
        </div>
      </div>

      <button type="submit"
              class="btn btn-primary w-100 mt-4"
              [disabled]="registerForm.invalid || isLoading">
        {{ isLoading ? 'Creating account...' : 'Create Account' }}
      </button>

    </form>

    <p class="text-center mt-4 mb-1">
      Already have an account?
      <a routerLink="/auth/login" class="fw-semibold text-decoration-none">Login</a>
    </p>

    <p class="text-center mb-0">
      Just exploring?
      <a routerLink="/campaigns" class="fw-semibold text-decoration-none">Browse campaigns</a>
    </p>

  </div>
</div>
