<section class="campaigns-page bg-light">
  <div class="container">

    <!-- Header -->
    <div class="row mb-4">
      <div class="col-12 col-md-8">
        <h2 class="fw-bold mb-1">All Active Campaigns</h2>
        <p class="text-muted mb-0">
          Browse and support verified active campaigns.
        </p>
      </div>
    </div>

    <!-- Campaign Grid -->
    <div class="row g-4">

      <div
        class="col-12 col-sm-6 col-lg-4 col-xl-3"
        *ngFor="let c of campaigns"
      >

        <div class="card h-100 shadow-sm border-0 campaign-card">

          <!-- Image -->
          <div class="campaign-image-wrapper">
  <img
    [src]="c.imageUrl || '/assets/background-img/default-campaign-bg.jpg'"
    [alt]="c.campaignName"
    class="campaign-image"
  />
</div>

          <!-- Body -->
          <div class="card-body d-flex flex-column">

            <h5 class="card-title text-truncate">
              {{ c.campaignName }}
            </h5>

            <p class="card-text text-muted small flex-grow-1 campaign-description">
              {{ c.campaignDescription }}
            </p>

            <!-- Progress -->
            <div class="mt-3">
              <div class="progress" style="height: 10px;">
                <div
                  class="progress-bar bg-success"
                  role="progressbar"
                  [style.width.%]="getProgressPercentage(c)"
                ></div>
              </div>

              <div class="small text-muted mt-2">
                £{{ c.currentAmount | number:'1.0-0' }}
                raised of
                £{{ c.goalAmount | number:'1.0-0' }}
              </div>
            </div>

          </div>

          <!-- Footer Button -->
          <div class="card-footer bg-white border-0 pt-0">
            <button
              class="btn btn-outline-primary w-100"
              [routerLink]="['/campaigns', c.campaignId]"
            >
              View Details
            </button>
          </div>

        </div>

      </div>

    </div>
  </div>
</section>
